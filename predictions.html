<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictions | King of Juco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--color-bg-primary:#0a0a0f;--color-bg-secondary:#12121a;--color-bg-card:#1a1a24;--color-bg-elevated:#22222e;--color-accent-primary:#e84033;--color-accent-secondary:#f5a623;--color-accent-blue:#3b82f6;--color-text-primary:#fff;--color-text-secondary:#a0a0b0;--color-text-muted:#5a5a6e;--color-success:#22c55e;--color-error:#ef4444;--color-border:#2a2a38;--font-display:'Bebas Neue',sans-serif;--font-body:'Inter',-apple-system,sans-serif}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--color-bg-primary);color:var(--color-text-secondary);line-height:1.6;overflow-x:hidden}a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;background:none;font-family:inherit}
    .site-header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 40px;height:72px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border)}.header-logo{display:flex;align-items:center;gap:12px}.header-logo-icon{width:40px;height:40px;background:var(--color-accent-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;color:#fff}.header-logo-text{font-family:var(--font-display);font-size:22px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase}.header-nav{display:flex;align-items:center;gap:28px}.header-nav a{color:var(--color-text-secondary);font-size:13px;font-weight:500;transition:color .3s}.header-nav a:hover{color:var(--color-text-primary)}.header-nav a.active{color:var(--color-accent-primary)}.mobile-menu-toggle{display:none;padding:8px}.mobile-menu-toggle span{display:block;width:24px;height:2px;background:var(--color-text-primary);margin:5px 0}
    .page-hero{padding:120px 24px 48px;text-align:center}.page-hero-label{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--color-accent-secondary);margin-bottom:12px}.page-hero-title{font-family:var(--font-display);font-size:64px;color:var(--color-text-primary);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}.page-hero-season{font-family:var(--font-display);font-size:28px;color:var(--color-accent-primary);letter-spacing:2px;margin-bottom:12px}.page-hero-desc{font-size:16px;color:var(--color-text-secondary);max-width:500px;margin:0 auto}
    .container{max-width:1000px;margin:0 auto;padding:0 24px}
    .section{padding:48px 0}.section-title{font-family:var(--font-display);font-size:32px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
    .events-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:48px}
    .event-card{background:var(--color-bg-card);border:1px solid var(--color-border);padding:24px;transition:border-color .3s}.event-card:hover{border-color:var(--color-border-hover)}.event-name{font-family:var(--font-display);font-size:22px;color:var(--color-text-primary);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}.event-desc{font-size:13px;color:var(--color-text-muted);margin-bottom:12px}.event-meta{display:flex;gap:16px;align-items:center;margin-bottom:12px}.event-status{display:inline-block;padding:3px 10px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}.event-status.open{background:rgba(34,197,94,.15);color:var(--color-success)}.event-status.locked{background:rgba(245,166,35,.15);color:var(--color-accent-secondary)}.event-status.resolved{background:rgba(59,130,246,.15);color:var(--color-accent-blue)}.event-deadline{font-size:11px;color:var(--color-text-muted)}
    .btn-sm{padding:10px 24px;background:var(--color-accent-primary);color:#fff;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:background .3s}.btn-sm:hover{background:#c7352a}.btn-sm:disabled{opacity:.5;cursor:not-allowed}
    .leaderboard{width:100%;border-collapse:collapse;margin-bottom:48px}.leaderboard th{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--color-text-muted);text-align:left;padding:12px 16px;border-bottom:1px solid var(--color-border)}.leaderboard td{padding:14px 16px;border-bottom:1px solid var(--color-border);font-size:14px}.leaderboard tr:hover td{background:var(--color-bg-card)}.lb-rank{font-family:var(--font-display);font-size:22px;color:var(--color-text-primary);width:48px}.lb-rank.gold{color:var(--color-accent-secondary)}.lb-rank.silver{color:#c0c0c0}.lb-rank.bronze{color:#cd7f32}.lb-user{color:var(--color-text-primary);font-weight:500}.lb-points{font-family:var(--font-display);font-size:20px;color:var(--color-accent-primary);text-align:right}
    .my-predictions{margin-bottom:80px}.my-pred-table{width:100%;border-collapse:collapse}.my-pred-table th{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--color-text-muted);text-align:left;padding:10px 16px;border-bottom:1px solid var(--color-border)}.my-pred-table td{padding:12px 16px;border-bottom:1px solid var(--color-border);font-size:13px;color:var(--color-text-secondary)}.pred-correct{color:var(--color-success)}.pred-incorrect{color:var(--color-error)}.pred-pending{color:var(--color-text-muted)}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,.85);backdrop-filter:blur(8px);z-index:2000;align-items:center;justify-content:center;padding:24px}.modal-overlay.active{display:flex}.modal{background:var(--color-bg-card);border:1px solid var(--color-border);max-width:450px;width:100%;padding:40px}.modal-close{float:right;font-size:20px;color:var(--color-text-muted);cursor:pointer}.modal-title{font-family:var(--font-display);font-size:24px;color:var(--color-text-primary);margin-bottom:20px}
    .form-group{margin-bottom:16px}.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:8px}.form-input{width:100%;padding:12px 16px;background:var(--color-bg-primary);border:1px solid var(--color-border);color:var(--color-text-primary);font-family:var(--font-body);font-size:14px;outline:none}.form-input:focus{border-color:var(--color-accent-primary)}
    .btn-submit{width:100%;padding:14px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:none}.btn-submit:hover{background:#c7352a}
    .msg{margin-top:12px;padding:10px;font-size:13px;text-align:center;display:none}.msg.success{display:block;background:rgba(34,197,94,.1);color:var(--color-success)}.msg.error{display:block;background:rgba(239,68,68,.1);color:var(--color-error)}
    @media(max-width:768px){.site-header{padding:0 20px}.header-nav{display:none}.mobile-menu-toggle{display:block}.page-hero-title{font-size:42px}.events-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="site-header"><a href="/" class="header-logo"><div class="header-logo-icon">KJ</div><div class="header-logo-text">King of Juco</div></a><nav class="header-nav"><a href="/membership.html">Exclusive</a><a href="/challenges.html">Challenges</a><a href="/qna.html">Q&A</a><a href="/story.html">Story</a><a href="/merch.html">Merch</a><a href="/predictions.html" class="active">Predictions</a></nav><button class="mobile-menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button></header>
  <section class="page-hero"><div class="page-hero-label">Test Your Knowledge</div><h1 class="page-hero-title">Predictions</h1><div class="page-hero-season">2026 Season</div><p class="page-hero-desc">Pick winners, call MVPs, and compete against the crew and fans. No money — just bragging rights.</p></section>
  <div class="container">
    <div class="section"><h2 class="section-title">Active Events</h2><div class="events-grid" id="eventsGrid"></div></div>
    <div class="section"><h2 class="section-title">Leaderboard</h2><table class="leaderboard" id="leaderboard"><thead><tr><th>Rank</th><th>User</th><th style="text-align:right">Points</th></tr></thead><tbody id="lbBody"></tbody></table></div>
    <div class="section my-predictions" id="mySection" style="display:none"><h2 class="section-title">My Predictions</h2><table class="my-pred-table"><thead><tr><th>Event</th><th>My Pick</th><th>Status</th><th>Points</th></tr></thead><tbody id="myPredBody"></tbody></table></div>
  </div>
  <div class="modal-overlay" id="modal"><div class="modal"><span class="modal-close" id="modalClose">&times;</span><h2 class="modal-title" id="mTitle"></h2><form id="predForm"><div class="form-group"><label class="form-label">Team or Player</label><input class="form-input" id="fTeam" placeholder="e.g. New York Yankees"></div><div class="form-group"><label class="form-label">Your Prediction</label><input class="form-input" id="fValue" placeholder="e.g. 95 wins" required></div><input type="hidden" id="fEventId"><input type="hidden" id="fType"><button type="submit" class="btn-submit">Submit Prediction</button></form><div class="msg" id="predMsg"></div></div></div>
  <script>
    const token=localStorage.getItem('koj_token');const username=localStorage.getItem('koj_username')||'';
    const demoEvents=[
      {id:'e1',eventName:'AL East Win Totals',description:'Predict the final win total for any AL East team.',eventType:'win_total',status:'open',locksAt:'2026-04-01',pointsPerCorrect:20},
      {id:'e2',eventName:'2026 AL MVP',description:'Who takes home the AL Most Valuable Player award?',eventType:'mvp',status:'open',locksAt:'2026-04-15',pointsPerCorrect:50},
      {id:'e3',eventName:'World Series Champion',description:'Call the 2026 World Series winner before the season starts.',eventType:'world_series',status:'locked',locksAt:'2026-03-20',pointsPerCorrect:100},
      {id:'e4',eventName:'2025 HR Leader',description:'Who led MLB in home runs last season?',eventType:'custom',status:'resolved',correctAnswer:'Aaron Judge',pointsPerCorrect:25}
    ];
    const demoLB=[
      {rank:1,username:'BaseballBrainiac',points:1240},{rank:2,username:'DiamondDave',points:1180},{rank:3,username:'JucoLegend',points:1055},{rank:4,username:'StatGuru42',points:980},{rank:5,username:'CrackerJack',points:925},{rank:6,username:'PowerHitter99',points:870},{rank:7,username:'FastFeet42',points:810},{rank:8,username:'BatFlipKing',points:755},{rank:9,username:'MusicMan',points:690},{rank:10,username:'FuturePro15',points:620}
    ];
    const demoMyPreds=[
      {eventName:'World Series Champion',predictionValue:'San Diego Padres',status:'pending',pointsAwarded:0},
      {eventName:'2025 HR Leader',predictionValue:'Aaron Judge',status:'correct',pointsAwarded:25},
      {eventName:'2025 NL Cy Young',predictionValue:'Zack Wheeler',status:'incorrect',pointsAwarded:0}
    ];
    let events=demoEvents,leaderboard=demoLB,myPreds=demoMyPreds;
    Promise.all([
      fetch('/.netlify/functions/get-predictions',{headers:token?{'Authorization':'Bearer '+token}:{}}).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch('/.netlify/functions/get-leaderboard').then(r=>r.ok?r.json():null).catch(()=>null)
    ]).then(([pData,lData])=>{
      if(pData?.events?.length)events=pData.events;
      if(pData?.userPredictions?.length)myPreds=pData.userPredictions;
      if(lData?.leaderboard?.length)leaderboard=lData.leaderboard;
      render();
    });

    function render(){
      document.getElementById('eventsGrid').innerHTML=events.map(e=>`<div class="event-card"><div class="event-meta"><span class="event-status ${e.status}">${e.status.toUpperCase()}</span>${e.status==='resolved'?`<span class="event-deadline">Answer: ${e.correctAnswer}</span>`:`<span class="event-deadline">Locks: ${e.locksAt||'TBD'}</span>`}</div><h3 class="event-name">${e.eventName}</h3><p class="event-desc">${e.description}</p><p style="font-size:12px;color:var(--color-accent-secondary);margin-bottom:12px">${e.pointsPerCorrect} pts if correct</p>${e.status==='open'?`<button class="btn-sm" onclick="openPred('${e.id}','${e.eventName}','${e.eventType}')">Make Your Pick</button>`:`<button class="btn-sm" disabled>${e.status==='locked'?'Locked':'Resolved'}</button>`}</div>`).join('');
      const rankClass=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
      document.getElementById('lbBody').innerHTML=leaderboard.map((r,i)=>`<tr${r.username===username?' style="background:rgba(232,64,51,.05)"':''}><td class="lb-rank ${rankClass(i)}">${r.rank}</td><td class="lb-user">@${r.username}</td><td class="lb-points">${r.points.toLocaleString()}</td></tr>`).join('');
      if(token&&myPreds.length){
        document.getElementById('mySection').style.display='block';
        document.getElementById('myPredBody').innerHTML=myPreds.map(p=>{const sc=p.status==='correct'||p.isCorrect?'pred-correct':p.status==='incorrect'?'pred-incorrect':'pred-pending';return `<tr><td>${p.eventName||''}</td><td>${p.predictionValue}</td><td class="${sc}">${(p.status||'pending').toUpperCase()}</td><td>${p.pointsAwarded||0}</td></tr>`}).join('');
      }
    }
    render();

    function openPred(id,name,type){if(!token){window.location.href='/login.html';return}document.getElementById('mTitle').textContent=name;document.getElementById('fEventId').value=id;document.getElementById('fType').value=type;document.getElementById('modal').classList.add('active')}
    document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('active'));
    document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('active')});
    document.getElementById('predForm').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('predMsg');msg.className='msg';try{const r=await fetch('/.netlify/functions/submit-prediction',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({eventId:document.getElementById('fEventId').value,predictionType:document.getElementById('fType').value,teamOrPlayer:document.getElementById('fTeam').value,predictionValue:document.getElementById('fValue').value})});const d=await r.json();if(r.ok){msg.textContent='Prediction locked in!';msg.className='msg success';document.getElementById('predForm').reset()}else{msg.textContent=d.error;msg.className='msg error'}}catch(err){msg.textContent='Network error';msg.className='msg error'}});
  </script>
</body>
</html>
