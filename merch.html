<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merch | King of Juco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--color-bg-primary:#0a0a0f;--color-bg-secondary:#12121a;--color-bg-card:#1a1a24;--color-bg-elevated:#22222e;--color-accent-primary:#e84033;--color-accent-secondary:#f5a623;--color-text-primary:#fff;--color-text-secondary:#a0a0b0;--color-text-muted:#5a5a6e;--color-success:#22c55e;--color-error:#ef4444;--color-border:#2a2a38;--color-border-hover:#3a3a4a;--font-display:'Bebas Neue',sans-serif;--font-body:'Inter',-apple-system,sans-serif}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--color-bg-primary);color:var(--color-text-secondary);line-height:1.6;overflow-x:hidden}a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;background:none;font-family:inherit}
    .site-header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 40px;height:72px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border)}.header-logo{display:flex;align-items:center;gap:12px}.header-logo-icon{width:40px;height:40px;background:var(--color-accent-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;color:#fff}.header-logo-text{font-family:var(--font-display);font-size:22px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase}.header-nav{display:flex;align-items:center;gap:28px}.header-nav a{color:var(--color-text-secondary);font-size:13px;font-weight:500;transition:color .3s}.header-nav a:hover{color:var(--color-text-primary)}.header-nav a.active{color:var(--color-accent-primary)}.mobile-menu-toggle{display:none;padding:8px}.mobile-menu-toggle span{display:block;width:24px;height:2px;background:var(--color-text-primary);margin:5px 0}
    .drop-hero{padding:120px 24px 64px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border)}.drop-hero-layout{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;max-width:1200px;margin:0 auto}.drop-product-image{width:100%;aspect-ratio:1;background:var(--color-bg-card);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center}.drop-product-placeholder{font-family:var(--font-display);font-size:64px;color:var(--color-border)}.drop-label{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--color-accent-primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}.drop-label-dot{width:6px;height:6px;background:var(--color-accent-primary);border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.drop-name{font-family:var(--font-display);font-size:48px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;line-height:1}.drop-price{font-family:var(--font-display);font-size:28px;color:var(--color-accent-secondary);margin-bottom:16px}.drop-desc{font-size:15px;color:var(--color-text-secondary);margin-bottom:24px;line-height:1.7}
    .countdown{display:flex;gap:16px;margin-bottom:32px}.countdown-block{text-align:center}.countdown-value{font-family:var(--font-display);font-size:36px;color:var(--color-text-primary);background:var(--color-bg-card);border:1px solid var(--color-border);padding:8px 16px;min-width:64px;display:block}.countdown-label{font-size:10px;color:var(--color-text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
    .btn-primary{display:inline-block;padding:14px 36px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:2px solid var(--color-accent-primary);transition:all .3s}.btn-primary:hover{background:transparent;color:var(--color-accent-primary)}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .section{padding:80px 0}.section-title{font-family:var(--font-display);font-size:36px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding-bottom:80px}.product-card{background:var(--color-bg-card);border:1px solid var(--color-border);overflow:hidden;transition:border-color .3s,transform .3s;cursor:pointer}.product-card:hover{border-color:var(--color-border-hover);transform:translateY(-4px)}.product-card-image{width:100%;aspect-ratio:1;background:var(--color-bg-elevated);display:flex;align-items:center;justify-content:center;position:relative}.product-card-placeholder{font-family:var(--font-display);font-size:24px;color:var(--color-border)}.sold-out-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,.7);display:flex;align-items:center;justify-content:center}.sold-out-text{font-family:var(--font-display);font-size:28px;color:var(--color-accent-primary);letter-spacing:3px;transform:rotate(-15deg)}.product-card-body{padding:20px}.product-card-name{font-family:var(--font-display);font-size:20px;color:var(--color-text-primary);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}.product-card-price{font-family:var(--font-display);font-size:18px;color:var(--color-accent-secondary)}.product-card-cat{font-size:10px;color:var(--color-text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,.85);backdrop-filter:blur(8px);z-index:2000;align-items:center;justify-content:center;padding:24px}.modal-overlay.active{display:flex}.modal{background:var(--color-bg-card);border:1px solid var(--color-border);max-width:500px;width:100%;padding:40px;max-height:90vh;overflow-y:auto}.modal-close{float:right;font-size:20px;color:var(--color-text-muted);cursor:pointer}.modal-title{font-family:var(--font-display);font-size:28px;color:var(--color-text-primary);margin-bottom:8px}.modal-price{font-family:var(--font-display);font-size:22px;color:var(--color-accent-secondary);margin-bottom:16px}
    .form-group{margin-bottom:16px}.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:8px}.form-input,.form-textarea,.form-select{width:100%;padding:12px 16px;background:var(--color-bg-primary);border:1px solid var(--color-border);color:var(--color-text-primary);font-family:var(--font-body);font-size:14px;outline:none}.form-input:focus,.form-textarea:focus{border-color:var(--color-accent-primary)}.form-textarea{height:80px;resize:vertical}.form-select{appearance:auto}
    .btn-submit{width:100%;padding:14px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:none}.btn-submit:hover{background:#c7352a}
    .msg{margin-top:12px;padding:10px;font-size:13px;text-align:center;display:none}.msg.success{display:block;background:rgba(34,197,94,.1);color:var(--color-success)}.msg.error{display:block;background:rgba(239,68,68,.1);color:var(--color-error)}
    @media(max-width:1024px){.product-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){.site-header{padding:0 20px}.header-nav{display:none}.mobile-menu-toggle{display:block}.drop-hero-layout{grid-template-columns:1fr;gap:32px}.drop-name{font-size:36px}.countdown{gap:8px}.countdown-value{font-size:24px;min-width:48px;padding:6px 10px}.product-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="site-header"><a href="/" class="header-logo"><div class="header-logo-icon">KJ</div><div class="header-logo-text">King of Juco</div></a><nav class="header-nav"><a href="/membership.html">Exclusive</a><a href="/challenges.html">Challenges</a><a href="/qna.html">Q&A</a><a href="/story.html">Story</a><a href="/merch.html" class="active">Merch</a><a href="/predictions.html">Predictions</a></nav><button class="mobile-menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button></header>

  <section class="drop-hero"><div class="drop-hero-layout"><div class="drop-product-image" style="background:#12121a"><img src="https://res.cloudinary.com/djngpyv15/image/upload/v1774445115/unisex-champion-hoodie-light-steel-front-69c3e1f60bdd4_pkkets.png" alt="The Origin Hoodie" style="width:80%;height:auto;object-fit:contain;margin:auto"></div><div><div class="drop-label"><span class="drop-label-dot"></span>Limited Drop</div><h1 class="drop-name">The Origin Hoodie</h1><div class="drop-price">$59.99</div><p class="drop-desc">Premium heavyweight hoodie celebrating the JUCO journey. Limited to 500 pieces. Once they're gone, they're gone.</p><div class="countdown" id="countdown"><div class="countdown-block"><span class="countdown-value" id="cdD">02</span><span class="countdown-label">Days</span></div><div class="countdown-block"><span class="countdown-value" id="cdH">14</span><span class="countdown-label">Hours</span></div><div class="countdown-block"><span class="countdown-value" id="cdM">37</span><span class="countdown-label">Mins</span></div><div class="countdown-block"><span class="countdown-value" id="cdS">52</span><span class="countdown-label">Secs</span></div></div><button class="btn-primary" onclick="openOrder('drop')">Cop It Now</button></div></div></section>

  <div class="container"><div class="section"><h2 class="section-title">All Merch</h2><div class="product-grid" id="productGrid"></div></div></div>

  <div class="modal-overlay" id="modal"><div class="modal"><span class="modal-close" id="modalClose">&times;</span><h2 class="modal-title" id="mTitle"></h2><div class="modal-price" id="mPrice"></div><form id="orderForm"><div class="form-group"><label class="form-label">Size</label><select class="form-select" id="fSize"><option>S</option><option>M</option><option selected>L</option><option>XL</option><option>2XL</option></select></div><div class="form-group"><label class="form-label">Quantity</label><input class="form-input" type="number" id="fQty" value="1" min="1" max="5"></div><div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="fName" required></div><div class="form-group"><label class="form-label">Shipping Address</label><textarea class="form-textarea" id="fAddr" required></textarea></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="fEmail" required></div><input type="hidden" id="fProductId"><button type="submit" class="btn-submit">Place Order</button></form><div class="msg" id="orderMsg"></div></div></div>

  <script>
    const token=localStorage.getItem('koj_token');
    let products=[
      {id:'drop1',productName:'The Origin Hoodie',price:59.99,category:'limited_edition',stockQuantity:500,isLimitedDrop:true},
      {id:'drop2',productName:'Bat Flip Tee',price:34.99,category:'limited_edition',stockQuantity:300,isLimitedDrop:true},
      {id:'3',productName:'King of Juco Cap',price:29.99,category:'hats',stockQuantity:200},
      {id:'4',productName:'JUCO Walk-On Tee',price:29.99,category:'apparel',stockQuantity:150},
      {id:'5',productName:'Diamond Chain',price:49.99,category:'accessories',stockQuantity:75},
      {id:'6',productName:'First Edition Hoodie',price:54.99,category:'apparel',stockQuantity:0}
    ];
    fetch('/.netlify/functions/get-merch').then(r=>r.ok?r.json():Promise.reject()).then(d=>{if(d.products?.length){products=d.products;renderProducts()}}).catch(()=>{});
    function renderProducts(){
      document.getElementById('productGrid').innerHTML=products.map(p=>`<div class="product-card" onclick="${p.stockQuantity>0?`openOrder('${p.id}')`:''}"><div class="product-card-image">${p.thumbnailURL?`<img src="${p.thumbnailURL}" alt="${p.productName}" style="width:100%;height:100%;object-fit:contain">`:`<span class="product-card-placeholder">${p.productName.split(' ').map(w=>w[0]).join('')}</span>`}${p.stockQuantity===0?'<div class="sold-out-overlay"><span class="sold-out-text">SOLD OUT</span></div>':''}</div><div class="product-card-body"><h3 class="product-card-name">${p.productName}</h3><div class="product-card-price">$${p.price.toFixed(2)}</div><div class="product-card-cat">${p.category.replace('_',' ')}</div></div></div>`).join('');
    }
    renderProducts();

    function openOrder(id){
      if(!token){window.location.href='/login.html';return}
      const p=id==='drop'?products[0]:products.find(x=>x.id===id);if(!p)return;
      document.getElementById('mTitle').textContent=p.productName;
      document.getElementById('mPrice').textContent='$'+p.price.toFixed(2);
      document.getElementById('fProductId').value=p.id;
      document.getElementById('fEmail').value=localStorage.getItem('koj_email')||'';
      document.getElementById('modal').classList.add('active');
    }
    document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('active'));
    document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('active')});
    document.getElementById('orderForm').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('orderMsg');msg.className='msg';try{const r=await fetch('/.netlify/functions/create-order',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({productId:document.getElementById('fProductId').value,size:document.getElementById('fSize').value,quantity:parseInt(document.getElementById('fQty').value),shippingName:document.getElementById('fName').value,shippingAddress:document.getElementById('fAddr').value,shippingEmail:document.getElementById('fEmail').value})});const d=await r.json();if(r.ok){msg.textContent='Order placed! Order ID: '+d.orderId;msg.className='msg success'}else{msg.textContent=d.error;msg.className='msg error'}}catch(err){msg.textContent='Network error';msg.className='msg error'}});

    // Countdown
    const target=new Date(Date.now()+(2*24+14)*60*60*1000);
    if(!window._ct)window._ct=target;
    setInterval(()=>{const d=window._ct-new Date();if(d<=0)return;document.getElementById('cdD').textContent=String(Math.floor(d/864e5)).padStart(2,'0');document.getElementById('cdH').textContent=String(Math.floor(d/36e5)%24).padStart(2,'0');document.getElementById('cdM').textContent=String(Math.floor(d/6e4)%60).padStart(2,'0');document.getElementById('cdS').textContent=String(Math.floor(d/1e3)%60).padStart(2,'0')},1000);
  </script>
</body>
</html>
