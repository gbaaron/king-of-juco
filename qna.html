<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask the Pros | King of Juco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--color-bg-primary:#0a0a0f;--color-bg-card:#1a1a24;--color-bg-elevated:#22222e;--color-accent-primary:#e84033;--color-accent-secondary:#f5a623;--color-accent-blue:#3b82f6;--color-text-primary:#fff;--color-text-secondary:#a0a0b0;--color-text-muted:#5a5a6e;--color-success:#22c55e;--color-error:#ef4444;--color-border:#2a2a38;--font-display:'Bebas Neue',sans-serif;--font-body:'Inter',-apple-system,sans-serif}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--color-bg-primary);color:var(--color-text-secondary);line-height:1.6;overflow-x:hidden}a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;background:none;font-family:inherit}
    .site-header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 40px;height:72px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border)}.header-logo{display:flex;align-items:center;gap:12px}.header-logo-icon{width:40px;height:40px;background:var(--color-accent-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;color:#fff}.header-logo-text{font-family:var(--font-display);font-size:22px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase}.header-nav{display:flex;align-items:center;gap:28px}.header-nav a{color:var(--color-text-secondary);font-size:13px;font-weight:500;transition:color .3s}.header-nav a:hover{color:var(--color-text-primary)}.header-nav a.active{color:var(--color-accent-primary)}.mobile-menu-toggle{display:none;padding:8px}.mobile-menu-toggle span{display:block;width:24px;height:2px;background:var(--color-text-primary);margin:5px 0}
    .page-hero{padding:120px 24px 48px;text-align:center}.page-hero-label{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--color-accent-secondary);margin-bottom:12px}.page-hero-title{font-family:var(--font-display);font-size:64px;color:var(--color-text-primary);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}.page-hero-desc{font-size:16px;color:var(--color-text-secondary);max-width:500px;margin:0 auto 24px}
    .player-name{font-family:var(--font-display);font-size:48px;color:var(--color-accent-primary);letter-spacing:2px;text-align:center;margin-bottom:32px}
    .container{max-width:800px;margin:0 auto;padding:0 24px}
    .btn-primary{display:inline-block;padding:14px 36px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:2px solid var(--color-accent-primary);transition:all .3s;margin-bottom:48px}.btn-primary:hover{background:transparent;color:var(--color-accent-primary)}
    .section-title{font-family:var(--font-display);font-size:28px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
    .question-list{list-style:none;margin-bottom:64px}
    .question-item{display:flex;align-items:flex-start;gap:16px;padding:20px 24px;background:var(--color-bg-card);border:1px solid var(--color-border);margin-bottom:8px;transition:border-color .3s}.question-item:hover{border-color:var(--color-border-hover)}
    .upvote-btn{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:48px;cursor:pointer;transition:color .3s;color:var(--color-text-muted)}.upvote-btn:hover{color:var(--color-accent-primary)}.upvote-btn.voted{color:var(--color-accent-primary)}.upvote-arrow{font-size:16px}.upvote-count{font-family:var(--font-display);font-size:22px}
    .question-content{flex:1}.question-text{font-size:15px;color:var(--color-text-primary);margin-bottom:4px}.question-author{font-size:12px;color:var(--color-text-muted)}.question-category{display:inline-block;padding:2px 8px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-muted);border:1px solid var(--color-border);margin-left:8px}
    .answered-badge{display:inline-block;padding:3px 8px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:rgba(34,197,94,.15);color:var(--color-success);margin-bottom:8px}
    .answer-text{font-size:13px;color:var(--color-text-secondary);background:var(--color-bg-elevated);padding:12px 16px;margin-top:8px;border-left:2px solid var(--color-success)}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,.85);backdrop-filter:blur(8px);z-index:2000;align-items:center;justify-content:center;padding:24px}.modal-overlay.active{display:flex}.modal{background:var(--color-bg-card);border:1px solid var(--color-border);max-width:500px;width:100%;padding:40px}.modal-close{float:right;font-size:20px;color:var(--color-text-muted);cursor:pointer}.modal-title{font-family:var(--font-display);font-size:28px;color:var(--color-text-primary);margin-bottom:24px}
    .form-group{margin-bottom:16px}.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:8px}.form-input,.form-textarea,.form-select{width:100%;padding:12px 16px;background:var(--color-bg-primary);border:1px solid var(--color-border);color:var(--color-text-primary);font-family:var(--font-body);font-size:14px;outline:none}.form-input:focus,.form-textarea:focus{border-color:var(--color-accent-primary)}.form-textarea{height:100px;resize:vertical}.form-select{appearance:auto}
    .btn-submit{width:100%;padding:14px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:none}.btn-submit:hover{background:#c7352a}
    .msg{margin-top:12px;padding:10px;font-size:13px;text-align:center;display:none}.msg.success{display:block;background:rgba(34,197,94,.1);color:var(--color-success)}.msg.error{display:block;background:rgba(239,68,68,.1);color:var(--color-error)}
    @media(max-width:768px){.site-header{padding:0 20px}.header-nav{display:none}.mobile-menu-toggle{display:block}.page-hero-title{font-size:42px}.player-name{font-size:36px}}
  </style>
</head>
<body>
  <header class="site-header"><a href="/" class="header-logo"><div class="header-logo-icon">KJ</div><div class="header-logo-text">King of Juco</div></a><nav class="header-nav"><a href="/membership.html">Exclusive</a><a href="/challenges.html">Challenges</a><a href="/qna.html" class="active">Q&A</a><a href="/story.html">Story</a><a href="/merch.html">Merch</a><a href="/predictions.html">Predictions</a></nav><button class="mobile-menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button></header>
  <section class="page-hero"><div class="page-hero-label">Your Questions. Their Answers.</div><h1 class="page-hero-title">Ask the Pros</h1><p class="page-hero-desc">Submit your questions and upvote the best ones. Top questions get asked on camera.</p></section>
  <div class="player-name">Fernando Tatis Jr.</div>
  <div class="container" style="text-align:center"><button class="btn-primary" id="askBtn">Submit a Question</button></div>
  <div class="container">
    <h2 class="section-title">Top Questions</h2>
    <ul class="question-list" id="questionList"></ul>
    <h2 class="section-title">Answered</h2>
    <ul class="question-list" id="answeredList"></ul>
  </div>
  <div class="modal-overlay" id="modal"><div class="modal"><span class="modal-close" id="modalClose">&times;</span><h2 class="modal-title">Ask a Question</h2><form id="qForm"><div class="form-group"><label class="form-label">Your Question</label><textarea class="form-textarea" id="fQuestion" placeholder="What would you ask?" required></textarea></div><div class="form-group"><label class="form-label">Target Player</label><input class="form-input" id="fPlayer" value="Fernando Tatis Jr."></div><div class="form-group"><label class="form-label">Category</label><select class="form-select" id="fCat"><option value="career">Career</option><option value="training">Training</option><option value="personal">Personal</option><option value="advice">Advice</option><option value="hot_take">Hot Take</option></select></div><button type="submit" class="btn-submit">Submit Question</button></form><div class="msg" id="qMsg"></div></div></div>
  <script>
    const token=localStorage.getItem('koj_token');
    let questions=[
      {id:'1',questionText:"What's the one pitch you wish you could throw?",submitterName:'DiamondDave',upvoteCount:342,status:'approved',category:'career'},
      {id:'2',questionText:"Who's the toughest pitcher you've ever faced?",submitterName:'JucoFan99',upvoteCount:287,status:'approved',category:'career'},
      {id:'3',questionText:'What did you think of Eric the first time you met him?',submitterName:'BaseballBri',upvoteCount:215,status:'approved',category:'personal'},
      {id:'4',questionText:'What advice would you give to a high schooler trying to go pro?',submitterName:'FuturePro15',upvoteCount:198,status:'approved',category:'advice'},
      {id:'5',questionText:'Hot take: Is the shift good or bad for baseball?',submitterName:'StatGuru42',upvoteCount:156,status:'approved',category:'hot_take'},
      {id:'6',questionText:"What's your pre-game playlist?",submitterName:'MusicMan',upvoteCount:134,status:'approved',category:'personal'},
      {id:'7',questionText:"What's the most embarrassing moment on the field?",submitterName:'CrackerJack',upvoteCount:445,status:'answered',category:'personal',answerText:"Oh man, I once tripped rounding second base on a routine double. The whole stadium saw it. Eric still brings it up every time we hang out."},
      {id:'8',questionText:'Do you watch your own highlights?',submitterName:'HighlightReel',upvoteCount:312,status:'answered',category:'career',answerText:"All the time! Especially the ones Eric edits. He makes me look way cooler than I am."}
    ];
    fetch('/.netlify/functions/get-questions').then(r=>r.ok?r.json():Promise.reject()).then(d=>{if(d.questions?.length){questions=d.questions;render()}}).catch(()=>{});
    function render(){
      const pending=questions.filter(q=>q.status==='approved').sort((a,b)=>b.upvoteCount-a.upvoteCount);
      const answered=questions.filter(q=>q.status==='answered');
      document.getElementById('questionList').innerHTML=pending.map(q=>`<li class="question-item"><div class="upvote-btn" onclick="upvote('${q.id}',this)"><span class="upvote-arrow">&#9650;</span><span class="upvote-count">${q.upvoteCount}</span></div><div class="question-content"><div class="question-text">${q.questionText}</div><div class="question-author">@${q.submitterName}<span class="question-category">${q.category}</span></div></div></li>`).join('');
      document.getElementById('answeredList').innerHTML=answered.map(q=>`<li class="question-item" style="flex-direction:column"><div style="display:flex;align-items:flex-start;gap:16px;width:100%"><div class="upvote-btn voted"><span class="upvote-count">${q.upvoteCount}</span></div><div class="question-content"><span class="answered-badge">Answered</span><div class="question-text">${q.questionText}</div><div class="question-author">@${q.submitterName}</div>${q.answerText?`<div class="answer-text">${q.answerText}</div>`:''}</div></div></li>`).join('');
    }
    render();
    async function upvote(id,btn){if(!token){window.location.href='/login.html';return}btn.classList.add('voted');const c=btn.querySelector('.upvote-count');c.textContent=parseInt(c.textContent)+1;try{await fetch('/.netlify/functions/upvote-question',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({questionId:id})})}catch(e){}}
    document.getElementById('askBtn').addEventListener('click',()=>{if(!token){window.location.href='/login.html';return}document.getElementById('modal').classList.add('active')});
    document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('active'));
    document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('active')});
    document.getElementById('qForm').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('qMsg');msg.className='msg';try{const r=await fetch('/.netlify/functions/submit-question',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({questionText:document.getElementById('fQuestion').value,targetPlayer:document.getElementById('fPlayer').value,category:document.getElementById('fCat').value})});const d=await r.json();if(r.ok){msg.textContent='Question submitted for review!';msg.className='msg success';document.getElementById('qForm').reset()}else{msg.textContent=d.error;msg.className='msg error'}}catch(err){msg.textContent='Network error';msg.className='msg error'}});
  </script>
</body>
</html>
