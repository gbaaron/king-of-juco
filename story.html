<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric's Story | King of Juco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --color-bg-primary:#0a0a0f;--color-bg-card:#1a1a24;--color-accent-primary:#e84033;--color-accent-secondary:#f5a623;--color-text-primary:#fff;--color-text-secondary:#a0a0b0;--color-text-muted:#5a5a6e;--color-border:#2a2a38;--color-border-hover:#3a3a4a;--font-display:'Bebas Neue',sans-serif;--font-body:'Inter',-apple-system,sans-serif; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--font-body);background:var(--color-bg-primary);color:var(--color-text-secondary);line-height:1.6;overflow-x:hidden}a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;background:none;font-family:inherit}
    .site-header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 40px;height:72px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border)}.header-logo{display:flex;align-items:center;gap:12px}.header-logo-icon{width:40px;height:40px;background:var(--color-accent-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;color:#fff}.header-logo-text{font-family:var(--font-display);font-size:22px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase}.header-nav{display:flex;align-items:center;gap:28px}.header-nav a{color:var(--color-text-secondary);font-size:13px;font-weight:500;transition:color .3s}.header-nav a:hover{color:var(--color-text-primary)}.header-nav a.active{color:var(--color-accent-primary)}.mobile-menu-toggle{display:none;padding:8px}.mobile-menu-toggle span{display:block;width:24px;height:2px;background:var(--color-text-primary);margin:5px 0}
    .story-hero{position:relative;min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;overflow:hidden}.story-hero-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 30%,rgba(232,64,51,.12) 0%,transparent 50%),radial-gradient(ellipse at 30% 70%,rgba(245,166,35,.08) 0%,transparent 40%),var(--color-bg-primary)}.story-hero-content{position:relative;z-index:1}.story-hero-label{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--color-accent-secondary);margin-bottom:16px}.story-hero-title{font-family:var(--font-display);font-size:96px;color:var(--color-text-primary);letter-spacing:4px;text-transform:uppercase;line-height:.9;margin-bottom:16px}.story-hero-subtitle{font-size:18px;color:var(--color-text-secondary);max-width:500px;margin:0 auto}
    .filters{display:flex;gap:8px;justify-content:center;padding:32px 24px;flex-wrap:wrap}.filter-btn{padding:8px 20px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-muted);border:1px solid var(--color-border);transition:all .3s}.filter-btn:hover{border-color:var(--color-border-hover);color:var(--color-text-secondary)}.filter-btn.active{border-color:var(--color-accent-primary);color:var(--color-accent-primary);background:rgba(232,64,51,.1)}
    .timeline{position:relative;max-width:900px;margin:0 auto;padding:64px 24px 100px}.timeline-line{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--color-border);transform:translateX(-50%)}
    .timeline-item{position:relative;display:flex;align-items:flex-start;margin-bottom:64px;opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}.timeline-item.visible{opacity:1;transform:translateY(0)}.timeline-item:nth-child(odd){flex-direction:row-reverse;padding-left:calc(50% + 40px)}.timeline-item:nth-child(even){padding-right:calc(50% + 40px)}
    .timeline-dot{position:absolute;left:50%;top:24px;width:16px;height:16px;background:var(--color-bg-primary);border:3px solid var(--color-border);border-radius:50%;transform:translateX(-50%);z-index:2}.timeline-item.key-moment .timeline-dot{border-color:var(--color-accent-primary);background:var(--color-accent-primary);box-shadow:0 0 16px rgba(232,64,51,.4)}
    .timeline-card{background:var(--color-bg-card);border:1px solid var(--color-border);padding:28px;width:100%;transition:border-color .3s}.timeline-item.key-moment .timeline-card{border-color:rgba(232,64,51,.3);box-shadow:0 0 24px rgba(232,64,51,.08)}.timeline-card:hover{border-color:var(--color-border-hover)}
    .timeline-year{font-family:var(--font-display);font-size:42px;color:var(--color-accent-secondary);letter-spacing:2px;line-height:1;margin-bottom:8px}.timeline-card-title{font-family:var(--font-display);font-size:24px;color:var(--color-text-primary);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;line-height:1.2}.timeline-card-desc{font-size:14px;color:var(--color-text-secondary);line-height:1.7;margin-bottom:12px}.timeline-card-quote{font-style:italic;font-size:14px;color:var(--color-accent-secondary);border-left:2px solid var(--color-accent-secondary);padding-left:12px;margin-top:12px}.timeline-card-category{display:inline-block;padding:3px 8px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-muted);border:1px solid var(--color-border);margin-top:12px}
    .timeline-video-icon{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(232,64,51,.1);border:1px solid rgba(232,64,51,.2);font-size:11px;font-weight:500;color:var(--color-accent-primary);margin-top:12px}.timeline-video-icon::before{content:'';display:inline-block;width:0;height:0;border-style:solid;border-width:5px 0 5px 8px;border-color:transparent transparent transparent var(--color-accent-primary)}
    .timeline-end{text-align:center;padding:80px 24px}.timeline-end-title{font-family:var(--font-display);font-size:48px;color:var(--color-text-primary);letter-spacing:2px;margin-bottom:16px}.timeline-end p{font-size:16px;color:var(--color-text-secondary);margin-bottom:32px}.btn-primary{display:inline-block;padding:14px 36px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:2px solid var(--color-accent-primary);transition:all .3s}.btn-primary:hover{background:transparent;color:var(--color-accent-primary)}
    @media(max-width:768px){.site-header{padding:0 20px}.header-nav{display:none}.mobile-menu-toggle{display:block}.story-hero-title{font-size:56px}.timeline-line{left:20px}.timeline-dot{left:20px}.timeline-item,.timeline-item:nth-child(odd),.timeline-item:nth-child(even){flex-direction:row;padding-left:56px;padding-right:0}.timeline-year{font-size:32px}}
  </style>
</head>
<body>
  <header class="site-header"><a href="/" class="header-logo"><div class="header-logo-icon">KJ</div><div class="header-logo-text">King of Juco</div></a><nav class="header-nav"><a href="/membership.html">Exclusive</a><a href="/challenges.html">Challenges</a><a href="/qna.html">Q&A</a><a href="/story.html" class="active">Story</a><a href="/merch.html">Merch</a><a href="/predictions.html">Predictions</a></nav><button class="mobile-menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button></header>
  <section class="story-hero"><div class="story-hero-bg"></div><div class="story-hero-content"><div class="story-hero-label">The Underdog Story</div><h1 class="story-hero-title">The Journey</h1><p class="story-hero-subtitle">From JUCO walk-on to 1 million subscribers. This is how it happened.</p></div></section>
  <div class="filters"><button class="filter-btn active" data-cat="all">All</button><button class="filter-btn" data-cat="juco">JUCO Days</button><button class="filter-btn" data-cat="youtube">YouTube</button><button class="filter-btn" data-cat="pro_journey">Pro Journey</button><button class="filter-btn" data-cat="milestone">Milestones</button></div>
  <div class="timeline" id="timeline"><div class="timeline-line"></div></div>
  <section class="timeline-end"><h2 class="timeline-end-title">And the Story Continues...</h2><p>Be part of the next chapter. Join the team.</p><a href="/signup.html" class="btn-primary">Join Free</a></section>
  <script>
    const demoEvents=[{year:'2016',title:'The Dream Begins',description:'Growing up in the Bay Area, Eric fell in love with baseball. Hours in the cage, weekend tournaments, and a dream bigger than anyone believed.',category:'juco',isKeyMoment:false,quoteText:''},{year:'2017',title:'JUCO Walk-On',description:'No scholarship offers. No D1 interest. Eric walked on to a junior college team with nothing but heart and a chip on his shoulder.',category:'juco',isKeyMoment:true,quoteText:'Nobody believed in me. So I had to believe in myself.'},{year:'2018',title:'First YouTube Upload',description:"A teammate filmed Eric's batting practice. He uploaded it on a whim. 47 views. But putting himself out there felt right.",category:'youtube',isKeyMoment:false,quoteText:''},{year:'2019',title:'The Bat Flip Heard Around the Internet',description:'One swing. One bat flip. 10 million views overnight. The internet found its new baseball personality.',category:'youtube',isKeyMoment:true,quoteText:'I checked my phone and thought it was broken. 10 million views.',videoURL:true},{year:'2020',title:'Building Through the Pandemic',description:'When baseball shut down, Eric doubled down on content. Daily uploads, creative challenges, 100K subscribers.',category:'youtube',isKeyMoment:false,quoteText:''},{year:'2021',title:'Meeting Tatis Jr.',description:"A DM turned into a phone call. A phone call turned into a collab. Eric linked up with Fernando Tatis Jr. and the baseball world took notice.",category:'pro_journey',isKeyMoment:true,quoteText:"He's not just a content creator. He's one of us.",videoURL:true},{year:'2022',title:'Julio Rodriguez Connection',description:'J-Rod saw the content and reached out personally. A fan moment became a genuine friendship built on mutual respect.',category:'pro_journey',isKeyMoment:false,quoteText:'',videoURL:true},{year:'2023',title:'500K Subscribers',description:'Half a million people chose to follow the journey. Eric celebrated with a massive fan meetup at a minor league park.',category:'milestone',isKeyMoment:false,quoteText:''},{year:'2024',title:'1 Million Strong',description:'The gold play button arrived. From 47 views to 1 million subscribers. The JUCO walk-on became the King of JUCO.',category:'milestone',isKeyMoment:true,quoteText:"This isn't my achievement. This is ours."},{year:'2026',title:'The Home Base',description:"YouTube was the beginning. Owning the relationship with fans — that's the future. Welcome home.",category:'milestone',isKeyMoment:true,quoteText:"We're not just building a website. We're building a home."}];
    let events=demoEvents,activeFilter='all';
    fetch('/.netlify/functions/get-timeline').then(r=>r.ok?r.json():Promise.reject()).then(d=>{if(d.events?.length){events=d.events;renderTimeline()}}).catch(()=>{});
    function renderTimeline(){const c=document.getElementById('timeline');const f=activeFilter==='all'?events:events.filter(e=>e.category===activeFilter);c.innerHTML='<div class="timeline-line"></div>';f.forEach(evt=>{const item=document.createElement('div');item.className='timeline-item'+(evt.isKeyMoment?' key-moment':'');item.innerHTML=`<div class="timeline-dot"></div><div class="timeline-card"><div class="timeline-year">${evt.year}</div><h3 class="timeline-card-title">${evt.title}</h3><p class="timeline-card-desc">${evt.description}</p>${evt.quoteText?`<div class="timeline-card-quote">"${evt.quoteText}"</div>`:''}${evt.videoURL?'<div class="timeline-video-icon">Watch the Moment</div>':''}<span class="timeline-card-category">${(evt.category||'').replace('_',' ')}</span></div>`;c.appendChild(item)});const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:0.1,rootMargin:'0px 0px -40px 0px'});c.querySelectorAll('.timeline-item').forEach(el=>obs.observe(el))}
    renderTimeline();
    document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeFilter=btn.dataset.cat;renderTimeline()})});
  </script>
</body>
