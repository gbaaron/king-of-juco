<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | King of Juco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg-primary: #0a0a0f;
      --color-bg-card: #1a1a24;
      --color-accent-primary: #e84033;
      --color-text-primary: #ffffff;
      --color-text-secondary: #a0a0b0;
      --color-text-muted: #5a5a6e;
      --color-success: #22c55e;
      --color-error: #ef4444;
      --color-border: #2a2a38;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg-primary);
      color: var(--color-text-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    a { text-decoration: none; color: inherit; }

    .auth-container { width: 100%; max-width: 440px; }

    .auth-logo { text-align: center; margin-bottom: 40px; }
    .auth-logo a { display: inline-flex; align-items: center; gap: 12px; }
    .auth-logo-icon {
      width: 40px; height: 40px; background: var(--color-accent-primary);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 18px; color: #fff;
    }
    .auth-logo-text {
      font-family: var(--font-display); font-size: 22px;
      color: var(--color-text-primary); letter-spacing: 2px; text-transform: uppercase;
    }

    .auth-card {
      background: var(--color-bg-card); border: 1px solid var(--color-border); padding: 40px;
    }

    .auth-title {
      font-family: var(--font-display); font-size: 36px;
      color: var(--color-text-primary); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .auth-subtitle { font-size: 14px; color: var(--color-text-muted); margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--color-text-secondary); margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 12px 16px; background: var(--color-bg-primary);
      border: 1px solid var(--color-border); color: var(--color-text-primary);
      font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.3s;
    }
    .form-input:focus { border-color: var(--color-accent-primary); }
    .form-input::placeholder { color: var(--color-text-muted); }

    .btn-submit {
      width: 100%; padding: 14px; background: var(--color-accent-primary);
      color: #fff; font-family: var(--font-body); font-size: 12px;
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      border: none; cursor: pointer; transition: background 0.3s;
    }
    .btn-submit:hover { background: #c7352a; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-message {
      margin-top: 16px; padding: 12px 16px; font-size: 13px;
      display: none; text-align: center;
    }
    .auth-message.success { display: block; background: rgba(34,197,94,0.1); color: var(--color-success); border: 1px solid rgba(34,197,94,0.2); }
    .auth-message.error { display: block; background: rgba(239,68,68,0.1); color: var(--color-error); border: 1px solid rgba(239,68,68,0.2); }

    .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--color-text-muted); }
    .auth-footer a { color: var(--color-accent-primary); font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) { .auth-card { padding: 24px; } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <a href="/">
        <div class="auth-logo-icon">KJ</div>
        <div class="auth-logo-text">King of Juco</div>
      </a>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account.</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      </form>

      <div class="auth-message" id="authMsg"></div>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/signup.html">Join free</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('authMsg');

      btn.textContent = 'Signing In...';
      btn.disabled = true;
      msg.className = 'auth-message';
      msg.style.display = 'none';

      try {
        const res = await fetch('/.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('koj_token', data.token);
          localStorage.setItem('koj_name', data.name);
          localStorage.setItem('koj_email', data.email);
          localStorage.setItem('koj_userId', data.userId);
          localStorage.setItem('koj_username', data.username);
          localStorage.setItem('koj_tier', data.tier);
          localStorage.setItem('koj_isAdmin', data.isAdmin);

          msg.textContent = 'Welcome back! Redirecting...';
          msg.className = 'auth-message success';
          setTimeout(() => { window.location.href = '/'; }, 1000);
        } else {
          msg.textContent = data.error || 'Something went wrong';
          msg.className = 'auth-message error';
          btn.textContent = 'Sign In';
          btn.disabled = false;
        }
      } catch (err) {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'auth-message error';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
