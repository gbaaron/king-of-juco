<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | King of Juco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg-primary: #0a0a0f;
      --color-bg-secondary: #12121a;
      --color-bg-card: #1a1a24;
      --color-bg-elevated: #22222e;
      --color-accent-primary: #e84033;
      --color-accent-secondary: #f5a623;
      --color-accent-blue: #3b82f6;
      --color-text-primary: #ffffff;
      --color-text-secondary: #a0a0b0;
      --color-text-muted: #5a5a6e;
      --color-success: #22c55e;
      --color-error: #ef4444;
      --color-border: #2a2a38;
      --color-border-hover: #3a3a4a;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg-primary);
      color: var(--color-text-secondary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* Header */
    .site-header {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      padding: 0 40px; height: 72px; display: flex;
      justify-content: space-between; align-items: center;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
    }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo-icon {
      width: 40px; height: 40px; background: var(--color-accent-primary);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 18px; color: #fff;
    }
    .header-logo-text {
      font-family: var(--font-display); font-size: 22px;
      color: var(--color-text-primary); letter-spacing: 2px; text-transform: uppercase;
    }
    .header-nav { display: flex; align-items: center; gap: 28px; }
    .header-nav a { color: var(--color-text-secondary); font-size: 13px; font-weight: 500; transition: color 0.3s; }
    .header-nav a:hover { color: var(--color-text-primary); }
    .mobile-menu-toggle { display: none; padding: 8px; }
    .mobile-menu-toggle span { display: block; width: 24px; height: 2px; background: var(--color-text-primary); margin: 5px 0; }

    /* Account */
    .account-page { padding: 112px 24px 80px; max-width: 800px; margin: 0 auto; }

    .profile-header {
      display: flex; align-items: center; gap: 24px;
      padding: 32px; background: var(--color-bg-card);
      border: 1px solid var(--color-border); margin-bottom: 32px;
    }
    .profile-avatar {
      width: 80px; height: 80px; background: var(--color-accent-primary);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 32px; color: #fff;
      flex-shrink: 0;
    }
    .profile-name {
      font-family: var(--font-display); font-size: 32px;
      color: var(--color-text-primary); letter-spacing: 1px; text-transform: uppercase;
    }
    .profile-username { font-size: 14px; color: var(--color-text-muted); }
    .profile-meta { display: flex; gap: 24px; margin-top: 8px; }
    .profile-meta-item { font-size: 12px; color: var(--color-text-secondary); }
    .profile-meta-value { color: var(--color-accent-secondary); font-weight: 600; }

    .badge-tier {
      display: inline-block; padding: 4px 12px; font-size: 10px;
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      margin-left: 12px;
    }
    .badge-tier.free { background: var(--color-bg-elevated); color: var(--color-text-secondary); border: 1px solid var(--color-border); }
    .badge-tier.mvp { background: var(--color-accent-secondary); color: #000; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--color-border); margin-bottom: 32px; }
    .tab-btn {
      padding: 12px 24px; font-size: 13px; font-weight: 500;
      color: var(--color-text-muted); letter-spacing: 0.5px;
      border-bottom: 2px solid transparent; transition: all 0.3s;
    }
    .tab-btn:hover { color: var(--color-text-secondary); }
    .tab-btn.active { color: var(--color-text-primary); border-bottom-color: var(--color-accent-primary); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Settings form */
    .settings-section {
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      padding: 32px; margin-bottom: 24px;
    }
    .settings-title {
      font-family: var(--font-display); font-size: 22px;
      color: var(--color-text-primary); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--color-text-secondary); margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 12px 16px; background: var(--color-bg-primary);
      border: 1px solid var(--color-border); color: var(--color-text-primary);
      font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.3s;
    }
    .form-input:focus { border-color: var(--color-accent-primary); }
    .form-input::placeholder { color: var(--color-text-muted); }

    .btn-save {
      padding: 12px 32px; background: var(--color-accent-primary); color: #fff;
      font-size: 12px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; border: none; transition: background 0.3s;
    }
    .btn-save:hover { background: #c7352a; }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    .settings-message {
      margin-top: 16px; padding: 10px 16px; font-size: 13px; display: none;
    }
    .settings-message.success { display: block; background: rgba(34,197,94,0.1); color: var(--color-success); }
    .settings-message.error { display: block; background: rgba(239,68,68,0.1); color: var(--color-error); }

    .btn-logout {
      padding: 12px 32px; background: transparent; color: var(--color-text-muted);
      font-size: 12px; font-weight: 500; letter-spacing: 1px;
      border: 1px solid var(--color-border); transition: all 0.3s;
    }
    .btn-logout:hover { border-color: var(--color-error); color: var(--color-error); }

    /* Activity placeholder */
    .empty-state {
      text-align: center; padding: 64px 24px;
      color: var(--color-text-muted);
    }
    .empty-state-icon {
      font-family: var(--font-display); font-size: 48px;
      color: var(--color-border); margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .site-header { padding: 0 20px; }
      .header-nav { display: none; }
      .mobile-menu-toggle { display: block; }
      .profile-header { flex-direction: column; text-align: center; }
      .profile-meta { justify-content: center; }
      .tabs { overflow-x: auto; }
      .settings-section { padding: 24px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="header-logo">
      <div class="header-logo-icon">KJ</div>
      <div class="header-logo-text">King of Juco</div>
    </a>
    <nav class="header-nav">
      <a href="/membership.html">Exclusive</a>
      <a href="/challenges.html">Challenges</a>
      <a href="/qna.html">Q&A</a>
      <a href="/story.html">Story</a>
      <a href="/merch.html">Merch</a>
      <a href="/predictions.html">Predictions</a>
    </nav>
    <button class="mobile-menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </header>

  <main class="account-page">
    <div class="profile-header" id="profileHeader">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div>
        <div style="display: flex; align-items: center;">
          <h1 class="profile-name" id="profileName">Loading...</h1>
          <span class="badge-tier free" id="profileTier">Free</span>
        </div>
        <div class="profile-username" id="profileUsername">@username</div>
        <div class="profile-meta">
          <span class="profile-meta-item"><span class="profile-meta-value" id="profilePoints">0</span> points</span>
          <span class="profile-meta-item">Member since <span class="profile-meta-value" id="profileSince">--</span></span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="settings">Settings</button>
      <button class="tab-btn" data-tab="activity">My Activity</button>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content active" id="tab-settings">
      <div class="settings-section">
        <h2 class="settings-title">Profile</h2>
        <form id="profileForm">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input class="form-input" type="text" id="settingName">
          </div>
          <div class="form-group">
            <label class="form-label">Favorite MLB Team</label>
            <input class="form-input" type="text" id="settingTeam" placeholder="e.g. San Diego Padres">
          </div>
          <button type="submit" class="btn-save" id="saveProfileBtn">Save Changes</button>
          <div class="settings-message" id="profileMsg"></div>
        </form>
      </div>

      <div class="settings-section">
        <h2 class="settings-title">Change Password</h2>
        <form id="passwordForm">
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input class="form-input" type="password" id="currentPassword" required>
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input class="form-input" type="password" id="newPassword" required minlength="8" placeholder="At least 8 characters">
          </div>
          <button type="submit" class="btn-save" id="savePasswordBtn">Update Password</button>
          <div class="settings-message" id="passwordMsg"></div>
        </form>
      </div>

      <div style="margin-top: 32px;">
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>

    <!-- Activity Tab -->
    <div class="tab-content" id="tab-activity">
      <div class="empty-state">
        <div class="empty-state-icon">---</div>
        <p>Your challenges, questions, predictions, and orders will show up here.</p>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('koj_token');
    if (!token) { window.location.href = '/login.html'; }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Load profile
    async function loadProfile() {
      try {
        const res = await fetch('/.netlify/functions/get-user', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) { localStorage.clear(); window.location.href = '/login.html'; return; }
        const user = await res.json();

        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileUsername').textContent = '@' + user.username;
        document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('profilePoints').textContent = user.points.toLocaleString();
        document.getElementById('profileSince').textContent = user.memberSince || '--';
        document.getElementById('settingName').value = user.name;
        document.getElementById('settingTeam').value = user.favoriteTeam;

        const tierBadge = document.getElementById('profileTier');
        tierBadge.textContent = user.membershipTier.toUpperCase();
        tierBadge.className = 'badge-tier ' + user.membershipTier;
      } catch (err) {
        console.error('Load profile error:', err);
      }
    }
    loadProfile();

    // Save profile
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveProfileBtn');
      const msg = document.getElementById('profileMsg');
      btn.disabled = true; btn.textContent = 'Saving...';
      msg.className = 'settings-message'; msg.style.display = 'none';

      try {
        const res = await fetch('/.netlify/functions/update-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({
            name: document.getElementById('settingName').value,
            favoriteTeam: document.getElementById('settingTeam').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = 'Profile updated!';
          msg.className = 'settings-message success';
          localStorage.setItem('koj_name', document.getElementById('settingName').value);
        } else {
          msg.textContent = data.error;
          msg.className = 'settings-message error';
        }
      } catch (err) {
        msg.textContent = 'Network error';
        msg.className = 'settings-message error';
      }
      btn.disabled = false; btn.textContent = 'Save Changes';
    });

    // Change password
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('savePasswordBtn');
      const msg = document.getElementById('passwordMsg');
      btn.disabled = true; btn.textContent = 'Updating...';
      msg.className = 'settings-message'; msg.style.display = 'none';

      try {
        const res = await fetch('/.netlify/functions/update-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({
            currentPassword: document.getElementById('currentPassword').value,
            newPassword: document.getElementById('newPassword').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = 'Password updated!';
          msg.className = 'settings-message success';
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
        } else {
          msg.textContent = data.error;
          msg.className = 'settings-message error';
        }
      } catch (err) {
        msg.textContent = 'Network error';
        msg.className = 'settings-message error';
      }
      btn.disabled = false; btn.textContent = 'Update Password';
    });

    function logout() {
      localStorage.removeItem('koj_token');
      localStorage.removeItem('koj_name');
      localStorage.removeItem('koj_email');
      localStorage.removeItem('koj_userId');
      localStorage.removeItem('koj_username');
      localStorage.removeItem('koj_tier');
      localStorage.removeItem('koj_isAdmin');
      window.location.href = '/';
    }
  </script>
</body>
</html>
