<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fan Challenges | King of Juco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--color-bg-primary:#0a0a0f;--color-bg-secondary:#12121a;--color-bg-card:#1a1a24;--color-bg-elevated:#22222e;--color-accent-primary:#e84033;--color-accent-secondary:#f5a623;--color-text-primary:#fff;--color-text-secondary:#a0a0b0;--color-text-muted:#5a5a6e;--color-success:#22c55e;--color-error:#ef4444;--color-border:#2a2a38;--color-border-hover:#3a3a4a;--font-display:'Bebas Neue',sans-serif;--font-body:'Inter',-apple-system,sans-serif}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--color-bg-primary);color:var(--color-text-secondary);line-height:1.6;overflow-x:hidden}a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;background:none;font-family:inherit}
    .site-header{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 40px;height:72px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border)}.header-logo{display:flex;align-items:center;gap:12px}.header-logo-icon{width:40px;height:40px;background:var(--color-accent-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;color:#fff}.header-logo-text{font-family:var(--font-display);font-size:22px;color:var(--color-text-primary);letter-spacing:2px;text-transform:uppercase}.header-nav{display:flex;align-items:center;gap:28px}.header-nav a{color:var(--color-text-secondary);font-size:13px;font-weight:500;transition:color .3s}.header-nav a:hover{color:var(--color-text-primary)}.header-nav a.active{color:var(--color-accent-primary)}.mobile-menu-toggle{display:none;padding:8px}.mobile-menu-toggle span{display:block;width:24px;height:2px;background:var(--color-text-primary);margin:5px 0}
    .page-hero{padding:120px 24px 48px;text-align:center}.page-hero-label{font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--color-accent-secondary);margin-bottom:12px}.page-hero-title{font-family:var(--font-display);font-size:64px;color:var(--color-text-primary);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}.page-hero-desc{font-size:16px;color:var(--color-text-secondary);max-width:500px;margin:0 auto 32px}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .btn-primary{display:inline-block;padding:14px 36px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:2px solid var(--color-accent-primary);transition:all .3s}.btn-primary:hover{background:transparent;color:var(--color-accent-primary)}
    .controls{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:32px}.filters{display:flex;gap:8px;flex-wrap:wrap}.filter-btn{padding:8px 16px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-muted);border:1px solid var(--color-border);transition:all .3s}.filter-btn.active{border-color:var(--color-accent-primary);color:var(--color-accent-primary);background:rgba(232,64,51,.1)}.sort-btns{display:flex;gap:8px}.sort-btn{padding:8px 16px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-muted);border:1px solid var(--color-border);transition:all .3s}.sort-btn.active{border-color:var(--color-text-primary);color:var(--color-text-primary)}
    .challenge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding-bottom:80px}
    .challenge-card{background:var(--color-bg-card);border:1px solid var(--color-border);overflow:hidden;transition:border-color .3s,transform .3s}.challenge-card:hover{border-color:var(--color-border-hover);transform:translateY(-4px)}.challenge-card.featured{border-color:var(--color-accent-secondary);box-shadow:0 0 20px rgba(245,166,35,.1)}.challenge-card-thumb{width:100%;height:180px;background:var(--color-bg-elevated);display:flex;align-items:center;justify-content:center;position:relative}.challenge-card-thumb-icon{font-family:var(--font-display);font-size:20px;color:var(--color-border)}.featured-badge{position:absolute;top:12px;left:12px;padding:4px 10px;background:var(--color-accent-secondary);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#000}.challenge-card-body{padding:20px}.challenge-card-title{font-family:var(--font-display);font-size:20px;color:var(--color-text-primary);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;line-height:1.2}.challenge-card-submitter{font-size:12px;color:var(--color-text-muted);margin-bottom:12px}.challenge-card-footer{display:flex;justify-content:space-between;align-items:center}.vote-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--color-border);font-size:13px;color:var(--color-text-secondary);transition:all .3s}.vote-btn:hover{border-color:var(--color-accent-primary);color:var(--color-accent-primary)}.vote-btn.voted{border-color:var(--color-accent-primary);color:var(--color-accent-primary);background:rgba(232,64,51,.1)}.vote-count{font-family:var(--font-display);font-size:18px}.category-tag{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-muted);padding:4px 8px;border:1px solid var(--color-border)}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,.85);backdrop-filter:blur(8px);z-index:2000;align-items:center;justify-content:center;padding:24px}.modal-overlay.active{display:flex}.modal{background:var(--color-bg-card);border:1px solid var(--color-border);max-width:500px;width:100%;padding:40px}.modal-close{float:right;font-size:20px;color:var(--color-text-muted);cursor:pointer}.modal-title{font-family:var(--font-display);font-size:28px;color:var(--color-text-primary);letter-spacing:1px;margin-bottom:24px}
    .form-group{margin-bottom:16px}.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:8px}.form-input,.form-textarea,.form-select{width:100%;padding:12px 16px;background:var(--color-bg-primary);border:1px solid var(--color-border);color:var(--color-text-primary);font-family:var(--font-body);font-size:14px;outline:none}.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--color-accent-primary)}.form-textarea{height:100px;resize:vertical}.form-select{appearance:auto}
    .btn-submit{width:100%;padding:14px;background:var(--color-accent-primary);color:#fff;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:none;transition:background .3s}.btn-submit:hover{background:#c7352a}
    .msg{margin-top:12px;padding:10px;font-size:13px;text-align:center;display:none}.msg.success{display:block;background:rgba(34,197,94,.1);color:var(--color-success)}.msg.error{display:block;background:rgba(239,68,68,.1);color:var(--color-error)}
    .fade-in{opacity:0;transform:translateY(24px);transition:opacity .6s,transform .6s}.fade-in.visible{opacity:1;transform:translateY(0)}
    @media(max-width:1024px){.challenge-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){.site-header{padding:0 20px}.header-nav{display:none}.mobile-menu-toggle{display:block}.page-hero-title{font-size:42px}.challenge-grid{grid-template-columns:1fr}.controls{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <header class="site-header"><a href="/" class="header-logo"><div class="header-logo-icon">KJ</div><div class="header-logo-text">King of Juco</div></a><nav class="header-nav"><a href="/membership.html">Exclusive</a><a href="/challenges.html" class="active">Challenges</a><a href="/qna.html">Q&A</a><a href="/story.html">Story</a><a href="/merch.html">Merch</a><a href="/predictions.html">Predictions</a></nav><button class="mobile-menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button></header>
  <section class="page-hero"><div class="page-hero-label">Show Us What You Got</div><h1 class="page-hero-title">Fan Challenges</h1><p class="page-hero-desc">Submit your best baseball moments. The community votes. Eric picks the winner.</p><button class="btn-primary" id="submitBtn">Submit Your Challenge</button></section>
  <div class="container">
    <div class="controls"><div class="filters" id="filters"></div><div class="sort-btns"><button class="sort-btn active" data-sort="votes">Most Votes</button><button class="sort-btn" data-sort="newest">Newest</button></div></div>
    <div class="challenge-grid" id="grid"></div>
  </div>
  <div class="modal-overlay" id="modal"><div class="modal"><span class="modal-close" id="modalClose">&times;</span><h2 class="modal-title">Submit a Challenge</h2><form id="submitForm"><div class="form-group"><label class="form-label">Title</label><input class="form-input" id="fTitle" placeholder="Epic Trick Shot" required></div><div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="fDesc" placeholder="Tell us about your challenge..."></textarea></div><div class="form-group"><label class="form-label">Video URL</label><input class="form-input" id="fVideo" placeholder="YouTube or TikTok link" required></div><div class="form-group"><label class="form-label">Category</label><select class="form-select" id="fCat"><option value="hitting">Hitting</option><option value="fielding">Fielding</option><option value="pitching">Pitching</option><option value="trick_shot">Trick Shot</option><option value="workout">Workout</option><option value="other">Other</option></select></div><button type="submit" class="btn-submit">Submit Challenge</button></form><div class="msg" id="submitMsg"></div></div></div>
  <script>
    const token=localStorage.getItem('koj_token');
    const cats=['all','hitting','fielding','pitching','trick_shot','workout'];
    let challenges=[
      {id:'1',title:'Behind-the-Back Trick Shot',submitterName:'BaseballKid2025',category:'trick_shot',voteCount:2847,status:'featured'},
      {id:'2',title:'500ft Home Run Derby',submitterName:'PowerHitter99',category:'hitting',voteCount:1923,status:'approved'},
      {id:'3',title:'No-Look Double Play',submitterName:'GloveWizard',category:'fielding',voteCount:1456,status:'approved'},
      {id:'4',title:'Knuckleball Challenge',submitterName:'PitchLab',category:'pitching',voteCount:1102,status:'approved'},
      {id:'5',title:'One-Handed Catch Compilation',submitterName:'DiamondDave',category:'fielding',voteCount:987,status:'approved'},
      {id:'6',title:'Speed Training Montage',submitterName:'FastFeet42',category:'workout',voteCount:764,status:'approved'},
      {id:'7',title:'Opposite Field Power',submitterName:'JucoFan99',category:'hitting',voteCount:621,status:'approved'},
      {id:'8',title:'Dugout Flip Challenge',submitterName:'BatFlipKing',category:'trick_shot',voteCount:543,status:'approved'}
    ];
    let activeFilter='all',activeSort='votes';
    fetch('/.netlify/functions/get-challenges').then(r=>r.ok?r.json():Promise.reject()).then(d=>{if(d.challenges?.length){challenges=d.challenges;render()}}).catch(()=>{});

    function render(){
      document.getElementById('filters').innerHTML=cats.map(c=>`<button class="filter-btn${activeFilter===c?' active':''}" data-cat="${c}">${c==='all'?'All':c.replace('_',' ')}</button>`).join('');
      document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{activeFilter=b.dataset.cat;render()}));
      let filtered=activeFilter==='all'?[...challenges]:challenges.filter(c=>c.category===activeFilter);
      if(activeSort==='votes')filtered.sort((a,b)=>b.voteCount-a.voteCount);else filtered.sort((a,b)=>new Date(b.submittedAt||0)-new Date(a.submittedAt||0));
      const grid=document.getElementById('grid');
      grid.innerHTML=filtered.map(c=>`<div class="challenge-card fade-in${c.status==='featured'?' featured':''}"><div class="challenge-card-thumb">${c.thumbnailURL?`<img src="${c.thumbnailURL}" alt="${c.title}" style="width:100%;height:100%;object-fit:cover">`:`<span class="challenge-card-thumb-icon">CHALLENGE</span>`}${c.status==='featured'?'<span class="featured-badge">Featured</span>':''}</div><div class="challenge-card-body"><h3 class="challenge-card-title">${c.title}</h3><p class="challenge-card-submitter">@${c.submitterName}</p><div class="challenge-card-footer"><button class="vote-btn" data-id="${c.id}" onclick="vote('${c.id}',this)"><span class="vote-count">${c.voteCount.toLocaleString()}</span> votes</button><span class="category-tag">${(c.category||'').replace('_',' ')}</span></div></div></div>`).join('');
      const obs=new IntersectionObserver(e=>{e.forEach(el=>{if(el.isIntersecting)el.target.classList.add('visible')})},{threshold:.1});grid.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
    }
    render();
    document.querySelectorAll('.sort-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeSort=b.dataset.sort;render()}));

    async function vote(id,btn){
      if(!token){window.location.href='/login.html';return}
      btn.classList.add('voted');const countEl=btn.querySelector('.vote-count');countEl.textContent=(parseInt(countEl.textContent.replace(/,/g,''))+1).toLocaleString();
      try{await fetch('/.netlify/functions/vote-challenge',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({challengeId:id})})}catch(e){}
    }

    document.getElementById('submitBtn').addEventListener('click',()=>{if(!token){window.location.href='/login.html';return}document.getElementById('modal').classList.add('active')});
    document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('active'));
    document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('active')});
    document.getElementById('submitForm').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('submitMsg');msg.className='msg';
      try{const r=await fetch('/.netlify/functions/submit-challenge',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({title:document.getElementById('fTitle').value,description:document.getElementById('fDesc').value,videoURL:document.getElementById('fVideo').value,category:document.getElementById('fCat').value})});const d=await r.json();if(r.ok){msg.textContent='Challenge submitted! It will appear after review.';msg.className='msg success';document.getElementById('submitForm').reset()}else{msg.textContent=d.error;msg.className='msg error'}}catch(err){msg.textContent='Network error';msg.className='msg error'}});
  </script>
</body>
</html>
